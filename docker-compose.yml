version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nhanh-media-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: adminpassword123
      POSTGRES_DB: nhanh_media
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
